<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Raghav Sharma favicon</title>
  <desc id="desc">A white square with a refined lowercase italic r in black.</desc>
  <defs>
    <style>
      @font-face {
        font-family: "Instrument Serif Favicon";
        src: url("/instrument-serif-italic.ttf") format("truetype");
        font-style: italic;
        font-weight: 400;
      }
    </style>
  </defs>
  <rect width="64" height="64" fill="#ffffff" />
  <text
    x="30.5"
    y="46"
    fill="#0a0a0a"
    font-family="'Instrument Serif Favicon', 'Instrument Serif', Georgia, serif"
    font-size="54"
    font-style="italic"
    stroke="#0a0a0a"
    stroke-width="0.55"
    paint-order="stroke fill"
    text-anchor="middle"
  >
    r
  </text>
</svg>
